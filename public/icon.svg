      <rect x="36" y="0" width="20" height="90" rx="4" />
      <rect x="66" y="0" width="12" height="90" rx="3" />
      <rect x="88" y="0" width="6" height="90" rx="2" />
      <rect x="104" y="0" width="24" height="90" rx="4" />
      <rect x="138" y="0" width="12" height="90" rx="3" />
      <rect x="160" y="0" width="6" height="90" rx="2" />
      <rect x="176" y="0" width="24" height="90" rx="4" />
      <rect x="210" y="0" width="12" height="90" rx="3" />
    </g>
